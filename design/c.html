<!DOCTYPE html>
<!-- 디자인 시안 C — 볼드 아레나 (강렬한 컬러블록 + 굵은 타이포, 스트릿 감성, 에너지) -->
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>시안 C · 볼드 아레나</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:#11131a;color:#fff;min-height:100vh}
.wrap{max-width:440px;margin:0 auto;padding:18px 16px 36px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.pill{background:#1c2030;border:2px solid #2b3145;border-radius:14px;padding:8px 14px;font-weight:900;font-size:.92rem}
.coin{color:#ffd23f}.fire{color:#ff5d73}
.hero{border-radius:22px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;
 background:#7c3aed;background-image:linear-gradient(135deg,#7c3aed,#db2777)}
.hero .big{font-family:Anton;font-size:3.1rem;line-height:.92;letter-spacing:.01em;text-transform:uppercase}
.hero .big em{font-style:normal;color:#ffd23f;-webkit-text-stroke:2px #11131a}
.sub{margin-top:10px;font-weight:700;opacity:.95}
.bar{height:10px;border-radius:99px;background:rgba(0,0,0,.25);margin-top:14px;overflow:hidden}
.bar i{display:block;height:100%;width:62%;background:#ffd23f}
.cta{display:block;width:100%;border:0;border-radius:16px;padding:20px;margin:14px 0;cursor:pointer;
 font-family:Anton;letter-spacing:.04em;font-size:1.5rem;text-transform:uppercase;color:#11131a;background:#39ff88;
 box-shadow:0 6px 0 #1faf5c}
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.tile{border-radius:16px;padding:16px 8px;text-align:center;font-weight:900;font-size:.88rem;color:#11131a}
.t1{background:#ffd23f}.t2{background:#38bdf8}.t3{background:#ff5d73;color:#fff}
.tile .ic{font-size:24px;display:block;margin-bottom:6px}
.label{font-family:Anton;letter-spacing:.06em;color:#6b7280;font-size:.95rem;margin:4px 2px 10px;text-transform:uppercase}
.word{background:#1c2030;border:2px solid #2b3145;border-radius:20px;padding:22px;text-align:center}
.wimg{width:96px;height:96px;border-radius:20px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:#11131a;border:2px solid #39ff88}
.en{font-family:Anton;font-size:2.4rem;text-transform:uppercase;letter-spacing:.02em}
.ko{color:#9aa3b2;margin-top:2px;font-weight:700}
.say{display:flex;gap:8px;margin-top:14px}
.say b{flex:1;border-radius:12px;padding:13px;font-weight:900;text-align:center;font-size:.95rem}
.s1{background:#2b3145;color:#dfe4ee}.s2{background:#39ff88;color:#11131a}
.note{text-align:center;color:#6b7280;font-size:.8rem;margin-top:22px}
</style></head><body><div class="wrap">
 <div class="top">
  <div class="pill coin">🪙 1,240</div>
  <div class="pill fire">🔥 12일</div>
 </div>
 <div class="hero">
  <div class="big">DAY<br><em>TWELVE</em></div>
  <div class="sub">8주차 · 축구 특집 ⚽ · 단어 5개</div>
  <div class="bar"><i></i></div>
 </div>
 <button class="cta">오늘의 훈련 ▶</button>
 <div class="tiles">
  <div class="tile t1"><span class="ic">🃏</span>내 카드</div>
  <div class="tile t2"><span class="ic">🎤</span>노래방</div>
  <div class="tile t3"><span class="ic">🎟️</span>내 쿠폰</div>
 </div>
 <div class="label">Word of the day</div>
 <div class="word">
  <div class="wimg"><svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="#39ff88" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 5l2.6 1.9-1 3h-3.2l-1-3z" fill="#39ff88" stroke="none"/><path d="M12 12l3 2.2M12 12l-3 2.2M12 12V8.5"/></svg></div>
  <div class="en">goal</div>
  <div class="ko">골 · 골인</div>
  <div class="say"><b class="s1">🔊 듣기</b><b class="s2">🎤 따라 말하기</b></div>
 </div>
 <div class="note">시안 C · 볼드 아레나</div>
</div></body></html>
