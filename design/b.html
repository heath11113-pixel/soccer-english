<!DOCTYPE html>
<!-- 디자인 시안 B — 브라이트 피치 (밝고 청량한 화이트 + 그린, 친근 프리미엄) -->
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>시안 B · 브라이트 피치</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;color:#0f2a1a;min-height:100vh;
 background:linear-gradient(180deg,#eafff1 0%,#f6fbf7 38%,#ffffff 100%)}
.wrap{max-width:440px;margin:0 auto;padding:18px 18px 36px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.pill{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2efe6;
 border-radius:999px;padding:8px 15px;font-weight:800;font-size:.92rem;box-shadow:0 4px 14px rgba(16,90,50,.06)}
.coin{color:#e0950a}.fire{color:#f4516c}
.hero{border-radius:26px;padding:24px 22px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden;
 background:linear-gradient(135deg,#34d27b,#16a34a);box-shadow:0 14px 30px rgba(22,163,74,.28)}
.hero .ball{position:absolute;right:-18px;bottom:-22px;font-size:120px;opacity:.18}
.kick{font-family:Poppins;font-weight:800;font-size:.78rem;letter-spacing:.2em;opacity:.92;margin-bottom:8px}
.day{font-family:Poppins;font-weight:800;font-size:1.7rem;line-height:1.15;margin-bottom:4px}
.sub{font-size:.95rem;opacity:.95}
.bar{height:9px;border-radius:99px;background:rgba(255,255,255,.35);margin-top:16px;overflow:hidden}
.bar i{display:block;height:100%;width:62%;border-radius:99px;background:#fff}
.cta{display:block;width:100%;border:0;border-radius:18px;padding:20px;margin:14px 0;cursor:pointer;
 font-family:'Noto Sans KR';font-weight:900;font-size:1.2rem;color:#fff;
 background:linear-gradient(135deg,#34d27b,#16a34a);box-shadow:0 10px 24px rgba(22,163,74,.3)}
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.tile{background:#fff;border:1px solid #e6f1ea;border-radius:18px;padding:16px 8px;text-align:center;
 font-weight:800;font-size:.9rem;color:#1d4731;box-shadow:0 6px 16px rgba(16,90,50,.05)}
.tile .ic{font-size:26px;display:block;margin-bottom:6px}
.label{font-family:Poppins;font-weight:800;letter-spacing:.1em;color:#7fae93;font-size:.74rem;margin:4px 2px 10px}
.word{background:#fff;border:1px solid #e6f1ea;border-radius:24px;padding:24px;text-align:center;box-shadow:0 10px 26px rgba(16,90,50,.07)}
.wimg{width:100px;height:100px;border-radius:26px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
 background:linear-gradient(135deg,#eafff1,#d6f7e3)}
.en{font-family:Poppins;font-weight:800;font-size:2rem;color:#0f2a1a}
.ko{color:#6b8b78;margin-top:2px}
.say{display:flex;gap:8px;margin-top:16px}
.say b{flex:1;border-radius:14px;padding:13px;font-weight:800;text-align:center;font-size:.95rem}
.s1{background:#eef4f0;color:#33614a}
.s2{background:#16a34a;color:#fff}
.note{text-align:center;color:#9bb6a7;font-size:.8rem;margin-top:22px}
</style></head><body><div class="wrap">
 <div class="top">
  <div class="pill coin">🪙 1,240</div>
  <div class="pill fire">🔥 12일</div>
 </div>
 <div class="hero">
  <span class="ball">⚽</span>
  <div class="kick">TODAY'S TRAINING</div>
  <div class="day">오늘의 훈련, Day 12</div>
  <div class="sub">8주차 · 축구 특집 · 단어 5개</div>
  <div class="bar"><i></i></div>
 </div>
 <button class="cta">▶  오늘의 훈련 시작</button>
 <div class="tiles">
  <div class="tile"><span class="ic">🃏</span>내 카드</div>
  <div class="tile"><span class="ic">🎤</span>노래방</div>
  <div class="tile"><span class="ic">🎟️</span>내 쿠폰</div>
 </div>
 <div class="label">WORD OF THE DAY</div>
 <div class="word">
  <div class="wimg"><svg width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 5l2.6 1.9-1 3h-3.2l-1-3z" fill="#16a34a" stroke="none"/><path d="M12 12l3 2.2M12 12l-3 2.2M12 12V8.5"/></svg></div>
  <div class="en">goal</div>
  <div class="ko">골 · 골인</div>
  <div class="say"><b class="s1">🔊 듣기</b><b class="s2">🎤 따라 말하기</b></div>
 </div>
 <div class="note">시안 B · 브라이트 피치</div>
</div></body></html>
